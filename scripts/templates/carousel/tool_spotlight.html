<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <style>
        body {
            margin: 0; padding: 0;
            width: 1080px; height: 1080px;
            background-color: #050505;
            color: #FFFFFF;
            font-family: var(--brand-font-primary), sans-serif;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            box-sizing: border-box;
            position: relative;
        }
        .icon {
            width: 120px; height: 120px;
            margin-bottom: 25px;
        }
        .headline {
            font-size: 100px;
            font-weight: 900;
            letter-spacing: -2px;
            text-transform: uppercase;
            margin-bottom: 50px;
            color: #FFFFFF;
        }
        .card {
            width: 820px;
            background: rgba(255, 255, 255, 0.03);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 35px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
        .section {
            padding: 35px 45px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            font-size: 30px;
            font-weight: 500;
        }
        .section:last-child {
            border-bottom: none;
        }
        .highlight-wrap {
            color: var(--brand-accent);
            font-family: var(--brand-font-secondary), serif;
            font-style: italic;
            font-size: 110%;
        }
        .top-sec { font-weight: 700; }
        .emoji { margin-right: 15px; }
        
        ul {
            margin: 0;
            padding-left: 30px;
            font-size: 32px;
            line-height: 1.6;
            font-weight: 500;
            color: #E2E8F0;
        }
        li {
            margin-bottom: 15px;
        }
        li:last-child { margin-bottom: 0; }
        li::marker { color: var(--brand-accent); }
        
        .footer-handle {
            position: absolute;
            bottom: 50px;
            font-size: 32px;
            color: rgba(255, 255, 255, 0.3);
            font-weight: 500;
            letter-spacing: 0.5px;
            font-style: italic;
        }
        /* --- GLOBAL HIGHLIGHT OVERRIDES (vFINAL) --- */
        span.highlight-text, .title span.highlight-text, .quote-text span.highlight-text, .headline span.highlight-text, .main-text span.highlight-text {
            color: #FFFFFF !important;
            background-color: var(--brand-accent) !important;
            font-style: italic !important;
            padding: 2px 10px !important;
            border-radius: 8px !important;
        }
        i.highlight-italic {
            color: var(--brand-accent) !important;
            font-style: italic !important;
        }
    </style>
</head>
<body>
    <svg class="icon" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M50 0V100M0 50H100M15 15L85 85M85 15L15 85M25 5L75 95M75 5L25 95M5 25L95 75M95 25L5 75" stroke="var(--brand-accent)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <div class="headline">{{headline}}</div>
    
    <div class="card">
        <div class="section top-sec">
            <span class="emoji">👉</span> MẠNH Ở: <span class="highlight-wrap">{{strong_point}}</span>
        </div>
        <div class="section">
            <ul>
                {{bullets}}
            </ul>
        </div>
        <div class="section top-sec">
            <span class="emoji">🎯</span> PHÙ HỢP: <span style="font-weight: 500; color: #FFF;">{{suitable_for}}</span>
        </div>
    </div>
    
    <div class="footer-handle footer-brand"></div>
</body>
</html>
