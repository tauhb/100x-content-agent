<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <style>
        body {
            margin: 0; padding: 0;
            width: 1080px; height: 1080px;
            background-color: #050505;
            /* Grid background pattern */
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            color: #FFFFFF;
            font-family: var(--brand-font-primary), sans-serif;
            display: flex; flex-direction: column;
            padding: 100px; box-sizing: border-box;
            position: relative;
        }
        .header {
            margin-bottom: 50px;
        }
        .headline {
            font-size: 65px;
            font-weight: 900;
            color: #FFF;
            line-height: 1.3;
            text-transform: uppercase;
        }
        .is-title-slide .headline {
            font-size: 90px;
            color: var(--brand-accent);
        }
        .content-box {
            display: flex;
            flex-direction: column;
            gap: 30px;
        }
        .framework-item {
            font-size: 40px;
            color: #DDD;
            line-height: 1.5;
            padding: 30px;
            background: rgba(255,255,255,0.05);
            border-left: 6px solid var(--brand-accent);
            border-radius: 0 15px 15px 0;
            font-weight: 500;
        }
        .author-tag {
            position: absolute;
            top: 70px; right: 70px;
            font-size: 26px; font-weight: 800; color: #555;
            text-transform: uppercase; letter-spacing: 2px;
        }
        .author-tag::after { content: var(--brand-handle); }
        .footer-info {
            position: absolute;
            bottom: 70px;
            left: 100px;
            right: 100px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 26px; color: #666; font-weight: 600;
            border-top: 2px solid #333;
            padding-top: 30px;
        }
        .swipe {
            color: var(--brand-accent);
        }
        .celeb-avatar {
            position: absolute;
            bottom: 120px;
            right: 100px;
            width: 400px; height: 400px;
            border-radius: 50%;
            object-fit: cover;
            border: 8px solid var(--brand-accent);
            box-shadow: 0 0 50px rgba(182, 255, 0, 0.2);
            z-index: 10;
        }
    </style>
</head>
<body class="{{isTitle}}">
    {{hookImageBase64}}
    <div class="author-tag"></div>
    <div class="header">
        <div class="headline">{{headline}}</div>
    </div>
    
    <div class="content-box">
        {{contentHtml}}
    </div>
    
    <div class="footer-info">
        <span>{{pageInfo}}</span>
        <span class="swipe">{{swipeText}}</span>
    </div>
</body>
</html>
