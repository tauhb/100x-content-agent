<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <style>
        body {
            margin: 0; padding: 0;
            width: 1080px; height: 1080px;
            background-color: #000;
            color: #FFFFFF;
            font-family: var(--brand-font-primary), sans-serif;
            display: flex; flex-direction: column;
            box-sizing: border-box;
            position: relative;
        }
        .header {
            height: 250px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 80px;
            text-align: center;
        }
        .headline {
            font-size: 55px; 
            font-weight: 900; 
            color: #FFF; 
            line-height: 1.2;
            text-transform: uppercase;
        }
        .columns {
            display: flex;
            flex: 1;
        }
        .col-left {
            flex: 1;
            background-color: #111;
            padding: 50px 60px;
            border-right: 2px solid #333;
            display: flex;
            flex-direction: column;
        }
        .col-right {
            flex: 1;
            background-color: #050505;
            padding: 50px 60px;
            display: flex;
            flex-direction: column;
        }
        .col-title-left {
            font-size: 40px;
            color: #888;
            font-weight: 800;
            margin-bottom: 40px;
            text-align: center;
            text-transform: uppercase;
        }
        .col-title-right {
            font-size: 40px;
            color: var(--brand-accent);
            font-weight: 800;
            margin-bottom: 40px;
            text-align: center;
            text-transform: uppercase;
        }
        ul {
            list-style: none;
            padding: 0;
            margin: 0;
            display: flex;
            flex-direction: column;
            gap: 25px;
        }
        .col-left li {
            font-size: 28px; color: #AAA; line-height: 1.4;
            padding-left: 20px; border-left: 4px solid #555;
        }
        .col-right li {
            font-size: 28px; color: #FFF; line-height: 1.4; font-weight: 600;
            padding-left: 20px; border-left: 4px solid var(--brand-accent);
        }
        .footer-info {
            height: 100px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 60px;
            border-top: 2px solid #333;
            background: #0a0a0a;
            font-size: 24px; color: #666; font-weight: 600;
        }
        .author-handle::after { content: var(--brand-handle); }
        .swipe {
            color: var(--brand-accent);
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="headline">{{headline}}</div>
    </div>
    
    <div class="columns">
        <div class="col-left">
            <div class="col-title-left">{{left_title}}</div>
            <ul>{{left_points}}</ul>
        </div>
        <div class="col-right">
            <div class="col-title-right">{{right_title}}</div>
            <ul>{{right_points}}</ul>
        </div>
    </div>
    
    <div class="footer-info">
        <span class="author-handle"></span>
        <span>{{pageInfo}}</span>
        <span class="swipe">{{swipeText}}</span>
    </div>
</body>
</html>
