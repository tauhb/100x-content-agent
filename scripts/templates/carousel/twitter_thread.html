<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <style>
        body {
            margin: 0; padding: 0;
            width: 1080px; height: 1080px;
            background-color: #000000;
            color: #FFFFFF;
            font-family: var(--brand-font-primary), sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-sizing: border-box;
            position: relative;
        }
        .tweet-card {
            background: #111111;
            width: 860px;
            border-radius: 20px;
            padding: 60px;
            border: 1px solid #333;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            display: flex;
            flex-direction: column;
            position: relative;
        }
        /* Thread Line */
        .thread-line {
            position: absolute;
            left: 110px;
            top: 170px;
            bottom: -60px; /* extends down to suggest continuation */
            width: 4px;
            background: #333;
            z-index: 0;
        }
        .tweet-header {
            display: flex;
            align-items: center;
            margin-bottom: 40px;
            z-index: 1;
        }
        .avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background-color: #222;
            background-image: url('{{avatarUrl}}');
            background-size: cover;
            background-position: center;
            margin-right: 25px;
            border: 4px solid #111;
        }
        .author-box {
            display: flex; flex-direction: column;
        }
        .author-name {
            font-size: 32px; font-weight: 800; color: #FFF; line-height: 1.2;
        }
        .author-handle {
            font-size: 26px; color: #888; margin-top: 5px;
        }
        .author-name::after { content: var(--brand-founder); }
        .author-handle::after { content: var(--brand-handle); }
        .tweet-content {
            font-size: 45px;
            line-height: 1.5;
            color: #E2E8F0;
            font-weight: 500;
            z-index: 1;
        }
        .footer-info {
            position: absolute;
            bottom: 40px;
            left: 110px;
            right: 110px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 26px; color: #666; font-weight: 600;
        }
        .swipe {
            color: var(--brand-accent);
        }
    </style>
</head>
<body>
    <div class="tweet-card">
        <div class="thread-line"></div>
        <div class="tweet-header">
            <div class="avatar"></div>
            <div class="author-box">
                <div class="author-name"></div>
                <div class="author-handle"></div>
            </div>
        </div>
        <div class="tweet-content">
            {{tweetContent}}
        </div>
    </div>
    
    <div class="footer-info">
        <span>{{pageInfo}}</span>
        <span class="swipe">{{swipeText}}</span>
    </div>
</body>
</html>
