<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <style>
        body {
            margin: 0; padding: 0;
            width: 1080px; height: 1350px;
            background-color: #000000;
            color: #FFFFFF;
            font-family: var(--brand-font-primary), sans-serif;
            display: flex; flex-direction: column;
            justify-content: center; align-items: flex-start;
            padding: 100px 120px; box-sizing: border-box;
            position: relative;
        }
        .main-text {
            font-size: {{fontSize}}px;
            font-weight: 700;
            line-height: 1.4;
            color: {{textColor}};
        }
        .main-text b {
            color: var(--brand-accent); /* Neon Accent */
        }
        .main-text i {
            color: #FFFFFF;
            font-family: var(--brand-font-secondary), serif;
            font-weight: 400;
            font-style: italic;
        }
        .footer {
            position: absolute; bottom: 80px; left: 120px; right: 120px;
            display: flex; justify-content: space-between; align-items: center;
            font-size: 32px; font-weight: 500; color: #666666;
            border-top: 2px solid #333333; padding-top: 40px;
        }
        .swipe {
            color: var(--brand-accent); font-weight: 700;
        }
        .brand {
            position: absolute; top: 80px; left: 120px;
            font-size: 28px; font-weight: 900; color: #444444; letter-spacing: 2px;
            text-transform: uppercase;
        }
        /* --- GLOBAL HIGHLIGHT OVERRIDES (vFINAL) --- */
        span.highlight-text, .title span.highlight-text, .quote-text span.highlight-text, .headline span.highlight-text, .main-text span.highlight-text {
            color: #FFFFFF !important;
            background-color: var(--brand-accent) !important;
            font-style: italic !important;
            padding: 2px 10px !important;
            border-radius: 8px !important;
        }
        i.highlight-italic {
            color: var(--brand-accent) !important;
            font-style: italic !important;
        }
    </style>
</head>
<body>
    <div class="brand footer-brand"></div>
    <div class="main-text">{{content}}</div>
    <div class="footer">
        <span>{{pageInfo}}</span>
        <span class="swipe">{{swipeText}}</span>
    </div>
</body>
</html>
