<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <style>
        body {
            margin: 0; padding: 0;
            width: 1080px; height: 1350px;
            background-color: #000;
            background-image: url('{{bgImageUrl}}');
            background-size: cover;
            background-position: center top;
            color: #FFFFFF;
            font-family: var(--brand-font-primary), sans-serif;
            position: relative;
        }
        .overlay {
            position: absolute; bottom: 0; left: 0; right: 0; height: 60%;
            background: linear-gradient(to bottom, transparent, #000000 80%);
            z-index: 1;
        }
        .content {
            position: absolute; bottom: 120px; left: 100px; right: 100px;
            z-index: 2;
        }
        .quote-icon {
            font-family: var(--brand-font-secondary), serif;
            font-size: 160px; color: var(--brand-accent); line-height: 0; margin-bottom: 50px;
        }
        .quote-text {
            font-size: 60px; font-weight: 700; line-height: 1.3; color: #FFF;
            margin-bottom: 50px; text-wrap: balance;
        }
        .quote-text strong, .quote-text span.accent {
            color: var(--brand-accent);
            font-family: var(--brand-font-secondary), serif;
            font-style: italic;
            font-size: 110%;
        }
        .author-box {
            display: flex; flex-direction: column; border-left: 6px solid var(--brand-accent); padding-left: 20px;
        }
        .author {
            font-size: 32px; color: #FFF; font-weight: 700; text-transform: uppercase; letter-spacing: 3px;
        }
        .handle { font-size: 28px; color: #888; font-weight: 500; margin-top: 5px; }
        /* --- GLOBAL HIGHLIGHT OVERRIDES (vFINAL) --- */
        span.highlight-text, .title span.highlight-text, .quote-text span.highlight-text, .headline span.highlight-text, .main-text span.highlight-text {
            color: #FFFFFF !important;
            background-color: var(--brand-accent) !important;
            font-family: var(--brand-font-secondary), serif !important;
            font-style: italic !important;
            padding: 2px 10px !important;
            border-radius: 8px !important;
        }
        i.highlight-italic {
            color: var(--brand-accent) !important;
            font-style: italic !important;
        }
    </style>
</head>
<body>
    <div class="overlay"></div>
    <div class="content">
        <div class="quote-icon">"</div>
        <div class="quote-text">{{quoteText}}</div>
        <div class="author-box">
            <div class="author">{{author}}</div>
            <div class="handle">{{handle}}</div>
        </div>
    </div>
</body>
</html>
