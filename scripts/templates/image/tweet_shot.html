<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <style>
        body {
            margin: 0; padding: 0;
            width: 1080px; height: 1350px;
            background-color: #111111;
            background-image: radial-gradient(circle at center, #222222, #050505);
            color: #FFFFFF;
            font-family: var(--brand-font-primary), sans-serif;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            box-sizing: border-box;
        }
        .tweet-card {
            background: #000000;
            width: 860px;
            border-radius: 20px;
            padding: 60px;
            border: 1px solid #333;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
        }
        .tweet-header {
            display: flex;
            align-items: center;
            margin-bottom: 40px;
        }
        .avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background-color: #333;
            background-size: cover;
            background-position: center;
            margin-right: 25px;
        }
        .author-box {
            display: flex; flex-direction: column;
        }
        .author-name {
            font-size: 32px; font-weight: 800; color: #FFF; line-height: 1.2;
        }
        .author-handle {
            font-size: 26px; color: #888; margin-top: 5px;
        }
        .author-name::after { content: var(--brand-founder); }
        .author-handle::after { content: var(--brand-handle); }
        .tweet-content {
            font-size: 45px;
            line-height: 1.5;
            color: #E2E8F0;
            font-weight: 500;
            text-wrap: balance;
        }
        /* --- GLOBAL HIGHLIGHT OVERRIDES --- */
        span.highlight-text {
            color: #000000 !important;
            background-color: var(--brand-accent) !important;
            font-family: var(--brand-font-secondary), serif !important;
            font-style: italic !important;
            padding: 2px 10px !important;
            border-radius: 8px !important;
            text-transform: lowercase;
        }
    </style>
</head>
<body>
    <div class="tweet-card">
        <div class="tweet-header">
            <div class="avatar" style="background-image: url('{{avatarUrl}}');"></div>
            <div class="author-box">
                <div class="author-name"></div>
                <div class="author-handle"></div>
            </div>
        </div>
        <div class="tweet-content">
            {{tweetHtml}}
        </div>
    </div>
</body>
</html>
