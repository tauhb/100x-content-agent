<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <style>
        body {
            margin: 0; padding: 0;
            width: 1080px; height: 1350px;
            background-color: #000;
            background-image: url('{{bgImageUrl}}');
            background-size: cover;
            background-position: center top;
            color: #FFFFFF;
            font-family: var(--brand-font-primary), sans-serif;
            position: relative;
        }
        /* Black gradient overlay to make text readable */
        .overlay {
            position: absolute; bottom: 0; left: 0; right: 0; height: 100%;
            background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.5) 40%, transparent 100%);
            z-index: 1;
        }
        .content {
            position: absolute; bottom: 100px; left: 100px; right: 100px;
            z-index: 2;
            display: flex;
            flex-direction: column;
        }
        .title {
            font-size: 50px; 
            font-weight: 800; 
            color: #FFF; 
            margin-bottom: 20px; 
            text-transform: uppercase;
        }
        .title strong, .title span.accent {
            color: var(--brand-accent);
            font-family: var(--brand-font-secondary), serif;
            font-style: italic;
            text-transform: none;
            letter-spacing: 0;
            font-size: 110%;
        }
        .author {
            font-size: 40px; 
            color: #FFF; 
            font-weight: 500; 
            margin-bottom: 20px;
        }
        .quote-text {
            font-size: 70px; 
            font-weight: 800; 
            line-height: 1.2; 
            color: #FFF;
            margin-bottom: 30px; 
            text-wrap: balance;
        }
        /* Highlighted words using the Neon Green accent color + Serif Font */
        .quote-text strong, .quote-text span.accent {
            color: var(--brand-accent);
            font-weight: 800;
            font-family: var(--brand-font-secondary), serif;
            font-style: italic;
            font-size: 110%;
        }
        .handle { 
            position: absolute;
            bottom: 30px;
            right: 50px;
            font-size: 28px; 
            color: rgba(255, 255, 255, 0.4); 
            font-weight: 400; 
            font-style: italic;
            z-index: 2;
            text-align: right;
        }
        /* --- GLOBAL HIGHLIGHT OVERRIDES (vFINAL) --- */
        span.highlight-text, .title span.highlight-text, .quote-text span.highlight-text, .headline span.highlight-text, .main-text span.highlight-text {
            color: #FFFFFF !important;
            background-color: var(--brand-accent) !important;
            font-family: var(--brand-font-secondary), serif !important;
            font-style: italic !important;
            padding: 2px 10px !important;
            border-radius: 8px !important;
        }
        i.highlight-italic {
            color: var(--brand-accent) !important;
            font-style: italic !important;
        }
    </style>
</head>
<body>
    <div class="overlay"></div>
    <div class="content">
        {{titleHtml}}
        <div class="author">{{author}}</div>
        <!-- In the engine, we will replace \n with <br/> and inject the quote.
             To highlight specific words, the upstream AI prompt will use <strong> or <span class="accent"> -->
        <div class="quote-text">“{{quoteText}}”</div>
    </div>
    <div class="handle footer-brand"></div>
</body>
</html>
