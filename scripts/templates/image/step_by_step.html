<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <style>
        body {
            margin: 0; padding: 0;
            width: 1080px; height: 1350px;
            background-color: #050505;
            background-image: radial-gradient(circle at top left, #1a1a1a, #050505);
            color: #FFFFFF;
            font-family: var(--brand-font-primary), sans-serif;
            position: relative;
            display: flex;
            flex-direction: column;
            padding: 100px;
            box-sizing: border-box;
        }
        .header {
            margin-bottom: 60px;
            border-bottom: 2px solid #333;
            padding-bottom: 40px;
        }
        .title {
            font-size: 55px; 
            font-weight: 900; 
            color: #FFF; 
            line-height: 1.2;
            text-transform: uppercase;
        }
        .steps-container {
            display: flex;
            flex-direction: column;
            gap: 40px;
            flex: 1;
        }
        .step {
            display: flex;
            align-items: flex-start;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 30px;
        }
        .step-number {
            font-family: var(--brand-font-secondary), serif;
            font-size: 40px;
            font-weight: 900;
            color: #050505;
            background-color: var(--brand-accent);
            width: 60px;
            height: 60px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 12px;
            margin-right: 30px;
            flex-shrink: 0;
        }
        .step-content {
            display: flex;
            flex-direction: column;
        }
        .step-title {
            font-size: 36px;
            font-weight: 800;
            color: #FFF;
            margin-bottom: 10px;
        }
        .step-desc {
            font-size: 28px;
            font-weight: 400;
            color: #AAA;
            line-height: 1.5;
        }
        .footer {
            margin-top: auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 2px solid #333;
            padding-top: 40px;
        }
        .author-box {
            display: flex; flex-direction: column;
        }
        .author {
            font-size: 28px; color: #FFF; font-weight: 700; text-transform: uppercase; letter-spacing: 2px;
        }
        .handle { font-size: 24px; color: var(--brand-accent); font-weight: 500; margin-top: 5px; }
        .author::after { content: var(--brand-founder); }
        .handle::after { content: var(--brand-handle); }
        /* --- GLOBAL HIGHLIGHT OVERRIDES --- */
        span.highlight-text {
            color: #000000 !important;
            background-color: var(--brand-accent) !important;
            font-family: var(--brand-font-secondary), serif !important;
            font-style: italic !important;
            padding: 2px 10px !important;
            border-radius: 8px !important;
            text-transform: lowercase;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="title">{{titleHtml}}</div>
    </div>
    
    <div class="steps-container">
        {{stepsHtml}}
    </div>
    
    <div class="footer">
        <div class="author-box">
            <div class="author"></div>
            <div class="handle"></div>
        </div>
    </div>
</body>
</html>
