<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <style>
        body {
            margin: 0; padding: 0;
            width: 1080px; height: 1350px;
            background-color: #000;
            color: #FFFFFF;
            font-family: var(--brand-font-primary), sans-serif;
            position: relative;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
        }
        .header {
            padding: 80px 100px;
            text-align: center;
        }
        .title {
            font-size: 55px; 
            font-weight: 900; 
            color: #FFF; 
            line-height: 1.2;
            text-transform: uppercase;
        }
        .columns {
            display: flex;
            flex: 1;
        }
        .col-left {
            flex: 1;
            background-color: #111;
            padding: 60px 80px;
            border-right: 2px solid #333;
            display: flex;
            flex-direction: column;
        }
        .col-right {
            flex: 1;
            background-color: #050505;
            padding: 60px 80px;
            display: flex;
            flex-direction: column;
        }
        .col-title-left {
            font-size: 45px;
            color: #888;
            font-weight: 800;
            margin-bottom: 50px;
            text-align: center;
            text-transform: uppercase;
        }
        .col-title-right {
            font-size: 45px;
            color: var(--brand-accent);
            font-weight: 800;
            margin-bottom: 50px;
            text-align: center;
            text-transform: uppercase;
        }
        .point-left {
            font-size: 30px;
            color: #AAA;
            margin-bottom: 35px;
            line-height: 1.4;
            padding-left: 30px;
            border-left: 4px solid #555;
        }
        .point-right {
            font-size: 30px;
            color: #FFF;
            margin-bottom: 35px;
            line-height: 1.4;
            padding-left: 30px;
            border-left: 4px solid var(--brand-accent);
            font-weight: 600;
        }
        .footer {
            height: 120px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-top: 2px solid #333;
            background: #0a0a0a;
        }
        .author {
            font-size: 28px; color: #FFF; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; text-align: center;
        }
        .handle { font-size: 24px; color: var(--brand-accent); font-weight: 500; margin-left: 15px;}
        .author::after { content: var(--brand-founder); }
        .handle::after { content: var(--brand-handle); }
        /* --- GLOBAL HIGHLIGHT OVERRIDES --- */
        span.highlight-text {
            color: #000000 !important;
            background-color: var(--brand-accent) !important;
            font-family: var(--brand-font-secondary), serif !important;
            font-style: italic !important;
            padding: 2px 10px !important;
            border-radius: 8px !important;
            text-transform: lowercase;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="title">{{titleHtml}}</div>
    </div>
    
    <div class="columns">
        <div class="col-left">
            <div class="col-title-left">{{leftTitle}}</div>
            {{leftPointsHtml}}
        </div>
        <div class="col-right">
            <div class="col-title-right">{{rightTitle}}</div>
            {{rightPointsHtml}}
        </div>
    </div>
    
    <div class="footer">
        <span class="author"></span>
        <span class="handle"></span>
    </div>
</body>
</html>
